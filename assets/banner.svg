<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="Mohamed Hekal  Systems Architect">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#071018"/>
      <stop offset="55%" stop-color="#0B1C24"/>
      <stop offset="100%" stop-color="#102A22"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#14B8A6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#14B8A6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bridge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1F3A36" stroke-width="1" opacity="0.45"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)"/>
  <rect width="1200" height="420" fill="url(#grid)"/>

  <!-- ambient glow -->
  <ellipse cx="900" cy="120" rx="280" ry="90" fill="#14B8A6" opacity="0.12" filter="url(#soft)"/>
  <ellipse cx="280" cy="320" rx="220" ry="70" fill="#F59E0B" opacity="0.08" filter="url(#soft)"/>

  <!-- abstract bridge / architecture lines -->
  <g opacity="0.9" stroke-linecap="round" fill="none">
    <path d="M80 300 C220 180, 380 180, 520 250 S780 340, 920 250 S1080 140, 1140 180" stroke="url(#bridge)" stroke-width="3" opacity="0.85"/>
    <path d="M80 320 C240 220, 400 210, 540 270 S760 330, 900 270 S1060 180, 1140 210" stroke="#1F6F66" stroke-width="1.5" opacity="0.7"/>
    <circle cx="520" cy="250" r="5" fill="#2DD4BF"/>
    <circle cx="920" cy="250" r="5" fill="#F59E0B"/>
    <circle cx="720" cy="295" r="3.5" fill="#94A3B8"/>
  </g>

  <!-- node constellation -->
  <g fill="#94A3B8" opacity="0.55">
    <circle cx="160" cy="110" r="2"/>
    <circle cx="210" cy="145" r="2"/>
    <circle cx="980" cy="90" r="2"/>
    <circle cx="1040" cy="130" r="2"/>
    <circle cx="1080" cy="70" r="1.5"/>
  </g>
  <g stroke="#334155" stroke-width="1" opacity="0.5">
    <path d="M160 110 L210 145"/>
    <path d="M980 90 L1040 130 L1080 70"/>
  </g>

  <!-- left accent bar -->
  <rect x="0" y="0" width="6" height="420" fill="url(#bridge)"/>

  <!-- identity -->
  <text x="72" y="118" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15" fill="#5EEAD4" letter-spacing="3">HEKAL // SYSTEMS</text>
  <text x="72" y="188" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="700" fill="#F8FAFC">Mohamed Hekal</text>
  <text x="72" y="232" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" fill="#94A3B8">Senior Backend À Laravel Architect À ERP &amp; SaaS Builder</text>

  <!-- pills -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13">
    <rect x="72" y="270" rx="6" ry="6" width="118" height="32" fill="#0F2A28" stroke="#115E59" stroke-width="1"/>
    <text x="90" y="291" fill="#5EEAD4">PHP / Laravel</text>

    <rect x="202" y="270" rx="6" ry="6" width="108" height="32" fill="#0F2A28" stroke="#115E59" stroke-width="1"/>
    <text x="220" y="291" fill="#5EEAD4">Open Source</text>

    <rect x="322" y="270" rx="6" ry="6" width="88" height="32" fill="#2A2110" stroke="#92400E" stroke-width="1"/>
    <text x="340" y="291" fill="#FBBF24">Egypt À MENA</text>
  </g>

  <!-- quote -->
  <text x="72" y="360" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-style="italic" fill="#64748B">I didnt just learn to build systems  I learned how to rebuild myself.</text>

  <!-- right schema block -->
  <g transform="translate(860, 86)" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
    <rect x="0" y="0" width="280" height="210" rx="12" fill="#061016" stroke="#1E3A36" stroke-width="1.5"/>
    <rect x="0" y="0" width="280" height="34" rx="12" fill="#0C1A1F"/>
    <circle cx="22" cy="17" r="5" fill="#EF4444" opacity="0.85"/>
    <circle cx="40" cy="17" r="5" fill="#F59E0B" opacity="0.85"/>
    <circle cx="58" cy="17" r="5" fill="#22C55E" opacity="0.85"/>
    <text x="78" y="22" font-size="12" fill="#64748B">architecture.schema</text>

    <text x="20" y="64" font-size="13" fill="#64748B">stack:</text>
    <text x="78" y="64" font-size="13" fill="#2DD4BF">laravel À vue À aws</text>
    <text x="20" y="92" font-size="13" fill="#64748B">focus:</text>
    <text x="78" y="92" font-size="13" fill="#E2E8F0">saas À erp À shipping</text>
    <text x="20" y="120" font-size="13" fill="#64748B">ship:</text>
    <text x="78" y="120" font-size="13" fill="#FBBF24">packages À not demos</text>
    <text x="20" y="148" font-size="13" fill="#64748B">mode:</text>
    <text x="78" y="148" font-size="13" fill="#94A3B8">concurrency-safe</text>
    <text x="20" y="176" font-size="13" fill="#64748B">status:</text>
    <text x="78" y="176" font-size="13" fill="#34D399">building in public</text>
    <rect x="20" y="192" width="240" height="2" fill="url(#glow)"/>
  </g>
</svg>
